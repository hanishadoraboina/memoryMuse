    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfbf7;
            color: #2d2d2d;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .baskerville {
            font-family: 'Libre+Baskerville', serif;
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .blur-in {
            filter: blur(5px);
            animation: blurOut 2s ease-out forwards;
        }
        @keyframes blurOut {
            to { filter: blur(0px); }
        }
    </style>
